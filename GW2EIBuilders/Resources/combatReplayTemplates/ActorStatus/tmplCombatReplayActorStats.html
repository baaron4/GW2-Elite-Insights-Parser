<template>
    <div>
        <div v-if="buffs">
            <combat-replay-actor-buff v-if="isPresent('Encounter Specifics')" :buffarray="data.encounterSpecifics" />
            <combat-replay-actor-buff v-if="isPresent('Others')" :buffarray="data.others" />
            <combat-replay-actor-buff v-if="isPresent('Conditions')" :buffarray="data.conditions" />
            <combat-replay-actor-buff v-if="isPresent('Shared')" :buffarray="data.shared" />
            <combat-replay-actor-buff v-if="isPresent('Boons')" :buffarray="data.boons" />
            <combat-replay-actor-buff v-if="isPresent('Consumables')" :buffarray="data.consumables" class="pb-1" />
        </div>

        <combat-replay-actor-status-component :time="time" :actorIndex="actorIndex" :isTarget="isTarget" />
        <combat-replay-actor-rotation-component v-if="rotation" :time="time" :actorindex="actorIndex" :isTarget="isTarget" />
        <combat-replay-actor-breakbars-component :actorIndex="actorIndex" :isTarget="isTarget" />
    </div>
</template>

<script>
    Vue.component("combat-replay-actor-stats-component", {
        mixins: [timeRefreshComponent],
        props: ["actorIndex", "time", "buffstoshow", "isTarget", "buffs", "rotation"],
        template: `${template}`,
        methods: {
            isPresent: function (type) {
                return this.buffstoshow.includes(type);
            }
        },
        computed: {
            actor: function () {
                return this.isTarget ? logData.targets[this.actorIndex] : logData.players[this.actorIndex];
            },
            data: function () {
                const res = {
                    shared: [],
                    boons: [],
                    conditions: [],
                    encounterSpecifics: [],
                    others: [],
                    consumables: []
                };
                for (const { id, states } of this.actor.details.boonGraph[0]) {
                    const state = findState(states, this.timeToUse / 1000, 0, states.length - 1);
                    if (!state) {
                        continue;
                    }

                    const buff = findSkill(true, id);
                    if (buff.consumable) {
                        res.consumables.push({ state, buff });
                    }
                    else if (buff.encounterSpecific) {
                        res.encounterSpecifics.push({ state, buff });
                    }
                    else if (logData.boons.includes(id)) {
                        res.boons.push({ state, buff });
                    }
                    else if (logData.offBuffs.includes(id) || logData.defBuffs.includes(id) || logData.supBuffs.includes(id)) {
                        res.shared.push({ state, buff });
                    }
                    else if (logData.conditions.includes(id)) {
                        res.conditions.push({ state, buff });
                    }
                    else {
                        res.others.push({ state, buff });
                    }
                }
                return res;
            }
        }
    });
</script>

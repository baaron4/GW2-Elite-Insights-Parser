<template>
    <div class="d-flex flex-row flex-wrap justify-content-center align-items-center">
        <div class="d-flex align-items-center mb-2 scale85">
            <input id="followTimeline" type="checkbox" v-model="followTimeline" class="mr-1" />
            <label for="followTimeline" class="mb-0 ml-1">Scroll with timeline</label>
            <div v-if="!isTouchDevice"
                 @click="resetMechanic()" class="ml-3 btn btn-small"
                 :class="{'btn-dark': !light, 'btn-light': light}">
                 Reset Mechanic Selection
            </div>
        </div>
        <div v-if="Object.keys(displayedSeverities).length > 0"class="d-flex align-items-center mb-2 scale75">
            <div v-for="displayedSeverity in displayedSeverities" class="form-check mb-2 mr-2">
                <input :id="displayedSeverity.id" type="checkbox" v-model="displayedSeverity.display"/>
                <label :for="displayedSeverity.id" class="mb-0">{{displayedSeverity.name}}</label>
            </div>
        </div>
        <div id="combat-replay-mechanics-list" class="combat-replay-mechanics-list-container d-flex d-flex-row w-100 scrollable-y">
            <table class="table table-sm table-striped table-hover mb-0" cellspacing="0" width="100%">
                <thead>
                    <tr>
                        <th class="sticky-header combat-replay-mechanics-list-time-header">
                            <div class="position-relative">Time</div>
                        </th>
                        <th class="sticky-header text-left combat-replay-mechanics-list-header combat-replay-mechanics-list-mech-header">
                            <div class="position-relative">
                                <a href="#" class="dropdown-toggle" data-toggle="dropdown" title="Filter Mechanics">
                                    Mechanic <span class="caret"></span>
                                </a>
                                <ul class="dropdown-menu p-2 font-weight-normal scrollabledropdown">
                                    <li class="d-flex flex-column justify-content-center align-items-center mb-1">
                                        <button style="width:165px;padding: 0.25rem 1rem;" type="button" class="btn btn-primary btn-sm"
                                                @click="selectAllMechanics()" @click.stop="stopClickEvent">
                                            Select all mechanics
                                        </button>
                                    </li>
                                    <li class="d-flex flex-column justify-content-center align-items-center mb-1 separator-border-bottom">
                                        <button style="width:165px;padding: 0.25rem 1rem;" type="button" class="btn btn-primary btn-sm"
                                                @click="deselectAllMechanics()" @click.stop="stopClickEvent">
                                            Deselect all mechanics
                                        </button>
                                    </li>
                                    <li v-for="(mechanic, index) in filteredMechanicsList" :key="index">
                                        <input :id="'crml-mechanic-' + index" type="checkbox" v-model="mechanic.displayed"
                                               @click.stop="stopClickEvent" />
                                        <label :for="'crml-mechanic-' + index" @click.stop="stopClickEvent">
                                            {{mechanic.name}}
                                        </label>
                                    </li>
                                </ul>
                            </div>
                        </th>
                        <th class="sticky-header text-left combat-replay-mechanics-list-header combat-replay-mechanics-list-actor-header">
                            <div class="position-relative">
                                <a href="#" class="dropdown-toggle" data-toggle="dropdown" title="Filter Actors">
                                    Actor <span class="caret"></span>
                                </a>
                                <ul class="dropdown-menu p-2 font-weight-normal scrollabledropdown">
                                    <li class="d-flex flex-column justify-content-center align-items-center mb-1">
                                        <button style="width:140px;padding: 0.25rem 1rem;" type="button" class="btn btn-primary btn-sm"
                                                @click="selectAllActors()" @click.stop="stopClickEvent">
                                            Select all actors
                                        </button>
                                    </li>
                                    <li class="d-flex flex-column justify-content-center align-items-center mb-1 separator-border-bottom">
                                        <button style="width:140px;padding: 0.25rem 1rem;" type="button" class="btn btn-primary btn-sm"
                                                @click="deselectAllActors()" @click.stop="stopClickEvent">
                                            Deselect all actors
                                        </button>
                                    </li>
                                    <li v-for="(actor, index) in actorsList" :key="index">
                                        <input :id="'crml-actor-' + index" type="checkbox" v-model="actor.displayed"
                                               @click.stop="stopClickEvent" />
                                        <label :for="'crml-actor-' + index" @click.stop="stopClickEvent">
                                            {{actor.name}}
                                        </label>
                                    </li>
                                </ul>
                            </div>
                        </th>
                    </tr>
                </thead>
                <tbody>
                    <tr v-for="event in filteredMechanicEvents" class="combat-replay-mechanics-list-row"
                        :class="{active: event.actor.id === selectedactorid}" @click="selectMechanic(event)">
                        <td :class="{'mech-actor-active': reactiveAnimationData.selectedMechanic.name === event.mechanic.name &&
                                    reactiveAnimationData.selectedMechanic.actorId === event.actor.id}" 
                                :data-original-title="'Timestamp'">
                                {{(event.time / 1000).toFixed(2)}}s
                        </td>
                        <td class="text-left mech-cell" 
                            :class="{'mech-active': reactiveAnimationData.selectedMechanic.name === event.mechanic.name}" 
                            :data-original-title="event.mechanic.description">
                            {{event.mechanic.name}}
                        </td>
                        <td class="text-left"
                            :class="{'mech-actor-active': reactiveAnimationData.selectedMechanic.name === event.mechanic.name &&
                                reactiveAnimationData.selectedMechanic.actorId === event.actor.id}">
                            <span class="cr-ellipsis" :data-original-title="event.actor.name">
                                {{event.actor.name}}
                            </span>
                        </td>
                    </tr>
                    <tr v-for="event in paddedMechanics" class="combat-replay-mechanics-list-row">
                        <td>
                        </td>
                        <td class="text-left mech-cell" >
                        </td>
                        <td class="text-left">
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</template>

<script>
    const mechanicDataCache = new Map();
    Vue.component("combat-replay-mechanics-list-component", {
        props: ['time', 'light', 'selectedactorid'],
        mixins: [encounterPhaseComponent],
        template: `${template}`,
        data: function () {
            return {
                isTouchDevice: isTouchDevice,
                scrollTop: 0,
                div: null,
                followTimeline: false,
                reactiveAnimationData: reactiveAnimationData,
                mechanicData: this.computeMechanicData(0),
            };
        },
        mounted() {
            this.mechanicData = this.computeMechanicData(this.encounterPhase.id);
        },
        activated() {
            this.div = document.getElementById('combat-replay-mechanics-list');
            this.div.scrollTop = this.scrollTop;
            this.div.onscroll = (event) => {
                this.scrollTop = this.div.scrollTop;
            }
        },
        deactivated() {
            this.div.onscroll = null;
            this.div = null;
        },
        methods: {
            selectMechanic: function (mechanic) {
                this.followTimeline = false;
                animator.stopAnimate(true);
                animator.updateTime(mechanic.time + this.encounterPhase.start * 1000);

                // Deselection
                if (reactiveAnimationData.selectedMechanic.actorId == mechanic.actor.id &&
                    reactiveAnimationData.selectedMechanic.name == mechanic.mechanic.name) {
                    this.resetMechanic();
                    return;
                }

                // Selection
                reactiveAnimationData.selectedMechanic.actorId = mechanic.actor.id;
                reactiveAnimationData.selectedMechanic.name = mechanic.mechanic.name;
                reactiveAnimationData.selectedMechanic.times =
                    this.mechanicEvents
                        .filter(event =>
                            event.actor.id === mechanic.actor.id &&
                            event.mechanic.name === mechanic.mechanic.name)
                        .map(event => event.time + this.encounterPhase.start * 1000);
                reactiveAnimationData.selectedMechanic.actorName = mechanic.actor.name;
            },
            stopClickEvent: function (event) {
                event.stopPropagation();
            },
            selectAllMechanics: function () {
                for (let i = 0; i < this.mechanicsList.length; i++) {
                    this.mechanicsList[i].displayed = true;
                }
            },
            selectAllActors: function () {
                for (let i = 0; i < this.actorsList.length; i++) {
                    this.actorsList[i].displayed = true;
                }
            },
            deselectAllMechanics: function () {
                for (let i = 0; i < this.mechanicsList.length; i++) {
                    this.mechanicsList[i].displayed = false;
                }
            },
            deselectAllActors: function () {
                for (let i = 0; i < this.actorsList.length; i++) {
                    this.actorsList[i].displayed = false;
                }
            },
            scrollToClosestEvent: function (time) {
                const events = this.filteredMechanicEvents;
                const container = this.div;

                const timeToUse = time - this.encounterPhase.start * 1000;

                // find closest event index
                let closestIndex = 0;
                let minDiff = Math.abs(events[0].time - timeToUse);

                for (let i = 1; i < events.length; i++) {
                    const diff = Math.abs(events[i].time - timeToUse);
                    if (diff < minDiff) {
                        minDiff = diff;
                        closestIndex = i;
                    }
                }

                // scroll to that row
                const rows = container.getElementsByTagName("tr");
                const targetRow = rows[closestIndex + 1]; // +1 skips header row

                const containerRect = container.getBoundingClientRect();
                const rowRect = targetRow.getBoundingClientRect();

                const offset = rowRect.top - containerRect.top;
                const targetScroll = container.scrollTop + offset - container.clientHeight / 2;

                container.scrollTop = targetScroll;
            },
            resetMechanic() {
                reactiveAnimationData.selectedMechanic = {
                    actorId: null,
                    actorName: null,
                    name: null,
                    times: [],
                };
            },
            computeMechanicData: function(phaseId) {
                if (mechanicDataCache.has(phaseId)) {
                    return mechanicDataCache.get(phaseId);
                }
                const mechanicEvents = [];
                const phase = logData.phases[phaseId];
                const phaseTargets = phase.targets;
                for (let mechI = 0; mechI < graphData.mechanics.length; mechI++) {
                    const graphMechData = graphData.mechanics[mechI];
                    const logMechData = logData.mechanicMap[mechI];
                    const mechData = { name: logMechData.name, shortName: logMechData.shortName, severity: logMechData.severity };
                    const pointsArray = graphMechData.points[phaseId];
                    const icd = logMechData.icd;
                    // players
                    if (!logMechData.enemyMech) {
                        for (let playerI = 0; playerI < pointsArray.length; playerI++) {
                            let lastTime = -1000000;
                            const points = pointsArray[playerI];
                            const player = logData.players[playerI];
                            for (let i = 0; i < points.length; i++) {
                                const time = points[i][0] * 1000; // when mechanic occured in seconds
                                if (icd === 0 || (time - lastTime > icd)) {
                                    mechanicEvents.push({
                                        time: time,
                                        actor: { name: player.name, enemy: false, id: player.uniqueID },
                                        mechanic: mechData,
                                    });
                                }
                                lastTime = time;
                            }
                        }
                    } else {
                        // enemy
                        for (let targetI = 0; targetI < pointsArray.length; targetI++) {
                            const points = pointsArray[targetI];
                            const tarId = phaseTargets[targetI];
                            // target tracked in phase
                            if (tarId >= 0) {
                                const target = logData.targets[tarId];
                                for (let i = 0; i < points.length; i++) {
                                    const time = points[i][0]; // when mechanic occured in seconds
                                    mechanicEvents.push({
                                        time: time * 1000,
                                        actor: { name: target.name, enemy: true, id: target.uniqueID }, // target selection not supported
                                        mechanic: mechData,
                                    });
                                }
                            } else {
                                // target not tracked in phase
                                for (let i = 0; i < points.length; i++) {
                                    const time = points[i][0]; // when mechanic occured in seconds
                                    mechanicEvents.push({
                                        time: time * 1000,
                                        actor: { name: points[i][1], enemy: true, id: points[i][2] },
                                        mechanic: mechData,
                                    });
                                }
                            }
                        }
                    }
                }

                mechanicEvents.sort(function (a, b) {
                    return a.time - b.time;
                });

                let severities = [
                    MechanicSeverity.Sev0,
                    MechanicSeverity.Sev1,
                    MechanicSeverity.Sev2,
                    MechanicSeverity.Sev3,
                    MechanicSeverity.Sev4,
                ];
                let displayedSeverities = {
                };
                let trueCount = 0;
                for (let i = 0; i < severities.length; i++) {
                    const sev = severities[i];
                    if (mechanicsForSeverity(sev).length > 0) {
                        displayedSeverities[sev] = {
                            id: "sev-" + sev,
                            display: trueCount++ === 0 || sev <= MechanicSeverity.Sev1,
                            name: MechanicSeverityToName[sev],
                        };
                    }
                }

                const actors = {};
                const mechanics = {};
                for (let i = 0; i < mechanicEvents.length; i++) {
                    const event = mechanicEvents[i];
                    const mechanic = event.mechanic;
                    const mechName = mechanic.name;
                    const actorName = event.actor.name;
                    if (!mechanics[mechName]) {
                        mechanics[mechName] = Object.assign({}, event.mechanic, { displayed: true});
                    }
                    if (!actors[actorName]) {
                        actors[actorName] = Object.assign({}, event.actor, { displayed: true });
                    }
                }

                const actorsList = Object.values(actors); // could be sorted for more clarity
                actorsList.sort(function (a, b) {
                    if (a.enemy !== b.enemy) {
                        // Sort enemies after players
                        return a.enemy ? 1 : -1;
                    }
                    return a.name.localeCompare(b.name);
                });

                const mechanicsList = Object.values(mechanics);
                mechanicsList.sort(function (a, b) {
                    if (a.enemy !== b.enemy) {
                        // Sort enemies after players
                        return a.enemy ? 1 : -1;
                    }
                    return a.name.localeCompare(b.name);
                });
                const result = {          
                    mechanicEvents: mechanicEvents,
                    actors: actors,
                    actorsList: actorsList,
                    mechanics: mechanics,
                    mechanicsList: mechanicsList,
                    displayedSeverities: displayedSeverities,
                };
                mechanicDataCache.set(phaseId, result);
                return result;
            },
        },
        computed: {
            mechanicEvents: function() {
                return this.mechanicData.mechanicEvents;
            },
            actors: function() {
                return this.mechanicData.actors;
            },
            actorsList: function() {
                return this.mechanicData.actorsList;
            },
            mechanics: function() {
                return this.mechanicData.mechanics;
            },
            mechanicsList: function() {
                return this.mechanicData.mechanicsList;
            },
            displayedSeverities: function() {
                return this.mechanicData.displayedSeverities;
            },
            filteredMechanicEvents: function () {
                return this.mechanicEvents.filter(function (event) {
                    const severity = (event.mechanic.severity & MechanicSeverity.SeverityMask);
                    if (!this.displayedSeverities[severity].display) {
                        return false;
                    }
                    const mechanic = this.mechanics[event.mechanic.name];
                    if (mechanic && !mechanic.displayed) {
                        return false;
                    }
                    const actor = this.actors[event.actor.name];
                    if (actor && !actor.displayed) {
                        return false;
                    }
                    return true;
                }.bind(this))
            },
            filteredMechanicsList: function() {
                let result = [];
                for (let i = 0; i< this.mechanicsList.length; i++) {
                    const mech = this.mechanicsList[i];           
                    const severity = (mech.severity & MechanicSeverity.SeverityMask);
                    if (this.displayedSeverities[severity].display) {
                        result.push(mech);
                    }
                }
                return result;
            },
            // The drop downs look super bad on an empty array
            paddedMechanics: function() {
                const maxPadSize = 15;
                if (this.filteredMechanicEvents.length < maxPadSize) {
                    return new Array(maxPadSize - this.filteredMechanicEvents.length);
                }
                return [];
            },
        },
        watch: {
            encounterPhase: {
                handler: function () {
                    this.mechanicData = this.computeMechanicData(this.encounterPhase.id);
                    this.resetMechanic();
                    if (this.followTimeline) {
                        this.scrollToClosestEvent(this.time);
                    }
                },
                deep: true
            },
            time: function (newTime) {
                if (!this.followTimeline) return;
                this.scrollToClosestEvent(newTime);
            },      
            followTimeline: function (newValue) {
                if (!newValue) return;
                this.scrollToClosestEvent(this.time);
            }
        },
    });
</script>

<template>
    <div class="ei-target-list">
        <!-- All enemies toggle -->
        <div class="ei-target-row" @click="toggleAll">
            <div class="ei-target-check" :class="{ checked: allActive }">{{ allActive ? '✓' : '' }}</div>
            <span style="color:var(--text)">All enemies</span>
        </div>
        <!-- Main targets -->
        <div v-for="target in mainTargets"
             class="ei-target-row"
             :data-original-title="getTargetData(target.id).name"
             @click="target.data.active = !target.data.active">
            <div class="ei-target-check" :class="{ checked: target.data.active }">{{ target.data.active ? '✓' : '' }}</div>
            <img class="ei-target-icon" :src="getTargetData(target.id).icon" :alt="getTargetData(target.id).name">
            <span>{{ getTargetData(target.id).name }}</span>
        </div>
        <!-- Secondary targets -->
        <div v-if="secondaryTargets.length > 0">
            <div class="ei-group-label" style="padding-left:6px">Secondary</div>
            <div v-for="target in secondaryTargets"
                 class="ei-target-row"
                 :data-original-title="getTargetData(target.id).name"
                 @click="target.data.active = !target.data.active">
                <div class="ei-target-check" :class="{ checked: target.data.active }">{{ target.data.active ? '✓' : '' }}</div>
                <img class="ei-target-icon" :src="getTargetData(target.id).icon" :alt="getTargetData(target.id).name">
                <span>{{ getTargetData(target.id).name }}</span>
            </div>
        </div>
    </div>
</template>

<script>
    Vue.component("target-component", {
        props: ["targets", "phaseindex"],
        template: `${template}`,
        computed: {
            phase: function () {
                return logData.phases[this.phaseindex];
            },
            mainTargets: function() {
                let result = [];
                for (let i = 0; i < this.targets.length; i++) {
                    let target = this.targets[i][this.phaseindex];
                    if (!target.secondary && this.show(i)) {
                        result.push({id: i, data: target});
                    }
                }
                return result;
            },
            secondaryTargets: function() {
                let result = [];
                for (let i = 0; i < this.targets.length; i++) {
                    let target = this.targets[i][this.phaseindex];
                    if (target.secondary && this.show(i)) {
                        result.push({id: i, data: target});
                    }
                }
                return result;
            },
            allActive: function () {
                var all = this.mainTargets.concat(this.secondaryTargets);
                return all.length > 0 && all.every(function(t) { return t.data.active; });
            },
        },
        methods: {
            show: function (index) {
                return this.phase.targets.indexOf(index) !== -1;
            },
            toggleAll: function() {
                var newState = !this.allActive;
                this.mainTargets.concat(this.secondaryTargets).forEach(function(t) { t.data.active = newState; });
            },
            getTargetData: function (id) {
                return logData.targets[id];
            }
        }
    });
</script>

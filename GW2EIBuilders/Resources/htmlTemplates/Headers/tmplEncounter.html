<template>
    <!-- ── COMPACT SIDEBAR MODE ── -->
    <div v-if="compact">
        <div v-if="isMultiEncounterLog" class="ei-encounter-dropdown">
            <div class="ei-boss-name" @click="dropdownOpen = !dropdownOpen" style="cursor:pointer;user-select:none">
                {{ encounterData.nameNoMode }} <span style="font-size:10px;color:var(--text-dim)">▾</span>
            </div>
            <div v-if="dropdownOpen" class="ei-encounter-dropdown-menu">
                <div v-for="(enc, i) in encountersData" :key="i"
                     class="ei-encounter-dropdown-item"
                     @click="select(i); dropdownOpen = false">
                    {{ enc.nameNoMode }}
                </div>
            </div>
        </div>
        <div v-else class="ei-boss-name">{{ encounterData.nameNoMode }}</div>
        <div class="ei-boss-badges">
            <span v-if="encounterData.mode" class="ei-badge">{{ encounterData.mode }}</span>
            <span class="ei-badge" :class="encounterData.success ? 'ei-badge-success' : 'ei-badge-danger'">
                {{ encounterData.success ? '✓ Success' : '✗ Failure' }}
            </span>
        </div>
        <div class="ei-boss-meta">{{ encounterData.duration }}</div>
    </div>

    <!-- ── FULL CARD MODE ── -->
    <div v-if="!compact" class="card fight-summary" style="min-width: 350px;">
        <h3 v-if="isMultiEncounterLog" class="card-header text-center" >
            <a href="#" class="dropdown-toggle" data-toggle="dropdown" title="Select Encounter">
                <div :style="getMinWidth()">{{ encounterData.nameNoMode }}</div>
                <span class="caret"></span>
            </a>
            <ul class="dropdown-menu p-2 font-weight-normal scrollabledropdown" :style="getMinWidth()" style="max-height: 500px;">
                <li v-for="(encounterData, index) in encountersData" :key="index" :style="index === 0 ? {'border-bottom': '2px solid #bbb;'} : ''">
                   <a @click="select(index)" @click.stop="stopClickEvent" href="#" class="dropdown-item"
                        style="font-size: 1.0em; text-overflow: ellipsis; overflow: hidden; white-space: nowrap;">
                        <img class="icon-ll" :src="encounterData.icon">
                        {{encounterData.name}}
                    </a>
                </li>
            </ul>
        </h3>
        <h3 v-if="!isMultiEncounterLog" class="card-header text-center">
            {{ encounterData.nameNoMode }}
        </h3>
        <h7 class="card-header-fightMode text-center" v-if="!!encounterData.mode" :class="fightModeColorClass(encounterData.mode)">{{ encounterData.mode }}</h7>
        <div class="card-body card-body-encounter container">
            <div class="d-flex flex-row justify-content-center align-items-center">
                <div class="d-flex flex-column mr-3 justify-content-center">
                    <div v-if="encounterData.instanceBuffs" class="d-flex flex-row justify-content-around mb-1">
                        <span v-for="instanceBuff in encounterData.instanceBuffs">
                            {{instanceBuff.stack > 1 ? instanceBuff.stack + ' x' : ''}}
                            <img :data-original-title="instanceBuff.buff.name + (instanceBuff.buff.description ? '<br> ' + instanceBuff.buff.description : '')"
                                 :src="instanceBuff.buff.icon" class="icon icon-hover" />
                        </span>
                    </div>
                    <img class="encounter-icon" :src="encounterData.icon" :alt="encounterData.nameNoMode">
                </div>
                <div class="ml-1 d-flex flex-column justify-content-center">
                    <div v-if="!encounterData.hideTargets" class="mb-1" v-for="target in encounterData.targets">
                        <div class="small text-center">
                            {{target.name}}
                        </div>
                        <div :data-original-title="healthRemaining(target, !!target.hpBars)">
                            <div v-if="!!target.hpBars">
                                <div v-for="hpBar in target.hpBars" class="mt-1">
                                    <div class="health-bar" :style="{'background': getGradient(target, hpBar)}"></div>
                                    <div v-if="target.health > 0" class="super-small text-center">
                                        {{ targetHealthValues(target, hpBar) }}
                                    </div>
                                </div>
                            </div>
                            <div v-if="!target.hpBars">
                                <div class="health-bar" :style="{'background': getGradient(target, null)}"></div>
                                <div v-if="target.health > 0" class="super-small text-center">
                                    {{ targetHealthValues(target, null) }}
                                </div>
                            </div>
                        </div>
                    </div>
                    <div v-if="encounterData.hideTargets" class="mb-1">
                        <div>Players: {{ encounterData.playerCount }}</div>
                        <div>Friendlies: {{ encounterData.nonSquadFriendlyCount }}</div>
                        <div>Enemies: {{ encounterData.targetCount }}</div>
                    </div>
                    <div class="mb-2 mt-2">Duration: {{ encounterData.duration }}</div>
                    <div class="mb-2" v-if="fractalScale > 0">Fractal Scale: {{ fractalScale }}</div>
                    <div class="mb-2" v-if="!!instancePrivacy">{{ instancePrivacy }}</div>
                    <div class="mb-2 text-warning" v-if="encounterData.start"> {{ encounterData.start }}</div>
                    <div v-if="!encounterData.hideResult" class="text" :class="resultStatus.class">
                        Result: {{resultStatus.text}}
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>

<script>

    function hpBarIsConsumed(hpBar) {
        return hpBar[3] === 0;
    }
    function hpBarIsActive(hpBar) {
        return hpBar[3] === 1;
    }
    function hpBarIsUntouched(hpBar) {
        return hpBar[3] === 2;
    }

    Vue.component("encounter-component", {
        props: ["light", "encounters", "compact"],
        template: `${template}`,
        data: function () {
            return {
                isMultiEncounterLog: IsMultiEncounterLog,
                dropdownOpen: false,
            };
        },
        methods: {
            getMinWidth: function() {
                let width = 0;
                for (let i = 0; i < this.encountersData.length; i++) {
                    width = Math.max(this.encountersData[i].nameNoMode.length * 13, width);
                }
                width += 40;
                return {
                    'min-width': width + "px"
                };
            },
            stopClickEvent: function (event) {
                event.stopPropagation();
            },
            select: function(encounterIndex) {
                for (let i = 0; i < this.encounters.length; i++) {
                    this.encounters[i].active = false;
                }
                this.encounters[encounterIndex].active = true;
                const index = reactiveLogdata.activeEncounterPhaseData[encounterIndex].phase;
                // Select phase
                for (let i = 0; i < reactiveLogdata.phases.length; i++) {
                    reactiveLogdata.phases[i].active = false;
                }
                reactiveLogdata.phases[index].active = true;
                // Select an appropriate player
                const encounterPhase = logData.phases[this.encounters[encounterIndex].index];
                const players = getActiveNonFakePlayersForPhase(encounterPhase);
                let selectedPlayerIndex = reactiveLogdata.activeEncounterPhaseData[encounterIndex].player;
                for (let i = 0; i < reactiveLogdata.players.length; i++) {
                    reactiveLogdata.players[i].active = false;
                }
                if (players[selectedPlayerIndex]) {
                    reactiveLogdata.players[selectedPlayerIndex].active = true;
                } else {
                    const originalPlayer = logData.players[selectedPlayerIndex];
                    selectedPlayerIndex = -1;
                    for (let i = 0; i < logData.players.length; i++) {
                        const curPlayer = logData.players[i];
                        if (curPlayer.acc === originalPlayer.acc && players[i]) {
                            selectedPlayerIndex = i;
                            break;
                        }
                    }
                    if (selectedPlayerIndex >= 0) {
                        reactiveLogdata.players[selectedPlayerIndex].active = true;
                    } else {
                        for (let i = 0; i < logData.players.length; i++) {
                            const curPlayer = logData.players[i];
                            if (curPlayer.isPoV && players[i]) {
                                selectedPlayerIndex = i;
                                break;
                            }
                        }
                        reactiveLogdata.players[selectedPlayerIndex].active = true;
                    }
                    reactiveLogdata.activeEncounterPhaseData[encounterIndex].player = selectedPlayerIndex;
                }
            },
            getGradient: function (target, hpBar) {
                const minPercent = hpBar ? hpBar[0] : 0;
                const maxPercent = hpBar ? hpBar[1] : 100;
                let hpLeftPercent = target.hpLeftPercent;
                const barrierLeftPercent = hpBar && hpBarIsActive(hpBar) ? target.barrierLeftPercent : 0;
                if (hpBar) {
                    if (hpBarIsConsumed(hpBar)) {
                        hpLeftPercent = minPercent;
                    } else if (hpBarIsUntouched(hpBar)) {
                        hpLeftPercent = maxPercent;
                    }
                }
                let healthAndBarrier = hpLeftPercent + barrierLeftPercent;
                if (healthAndBarrier > maxPercent) {
                    hpLeftPercent -= healthAndBarrier - maxPercent;
                    healthAndBarrier = maxPercent;
                }
                const greyLowStart = "grey  " + 0 + "%";
                const greyLowEnd = "grey  " + minPercent + "%";
                const redStart = "red " + minPercent + "%";
                const red = "red " + hpLeftPercent + "%";
                const yellow = "yellow " + hpLeftPercent + "% " + healthAndBarrier + "%";
                const green = "green " + healthAndBarrier + "%";
                const greenEnd = "green " + maxPercent + "%";
                const greyHighStart = "grey  " + maxPercent + "%";
                const greyHighEnd = "grey  " + 100 + "%";
                const template = `linear-gradient(to right,
                        ${greyLowStart}, ${greyLowEnd},
                        ${redStart}, ${red},
                        ${yellow},
                        ${green}, ${greenEnd},
                        ${greyHighStart}, ${greyHighEnd}
                )`;
                return template;
            },
            healthRemaining: function (target, showTotalHP) {
                const hpLeft = target.hpLeft;
                const barrierLeft = target.barrierLeft;
                let res = null;
                let linebreak = "";
                if (showTotalHP) {
                    res = "Total Health: " + target.health;
                    linebreak = "<br>";
                }
                if (hpLeft > 0 && barrierLeft > 0) {
                    res += linebreak + 'Remaining:<br>Health: ' + hpLeft + '<br>Barrier: ' + barrierLeft;
                }
                else if (hpLeft > 0 && barrierLeft == 0) {
                    res += linebreak + 'Remaining Health: ' + hpLeft;
                }
                else if (barrierLeft > 0) {
                    res += linebreak + 'Remaining Barrier: ' + barrierLeft;
                }
                return res;
            },
            targetHealthValues: function (target, hpBar) {
                const minPercent = hpBar ? hpBar[0] : 0;
                const maxPercent = hpBar ? hpBar[1] : 100;
                const health = hpBar ? hpBar[2] : target.health;
                let hpLeft = target.hpLeftPercent;
                if (hpBar) {
                    if (hpBarIsConsumed(hpBar)) {
                        hpLeft = minPercent;
                    } else if (hpBarIsUntouched(hpBar)) {
                        hpLeft = maxPercent;
                    }
                }
                const barrierLeft = hpBar && hpBarIsActive(hpBar) ? target.barrierLeftPercent : 0;
                if ((hpLeft > minPercent && barrierLeft > 0) || (hpLeft == minPercent && barrierLeft > 0)) {
                    return health + " HP (" + hpLeft + "% + " + barrierLeft + "%)";
                }
                else if (hpLeft > minPercent && barrierLeft == 0) {
                    return health + " HP (" + hpLeft + "%)";
                }
                return health + " HP";
            },
            fightModeColorClass: function (mode) {
                switch (mode) {
                    case "Unknown":           return { 'fm-unknown': true };
                    case "Story Mode":        return { 'fm-story': true };
                    case "Quickplay Normal Mode": return { 'fm-quickplay': true };
                    case "Emboldened Normal Mode": return { 'fm-emboldened': true };
                    case "Normal Mode":       return { 'fm-normal': true };
                    case "Challenge Mode":    return { 'fm-challenge': true };
                    case "Legendary Challenge Mode": return { 'fm-legendary': true };
                    default: break;
                }
                return;
            },
        },
        computed: {
            encountersData: function () {
                let res = [];
                for (let j = 0; j < logData.phases.length; j++) {
                    const phase = logData.phases[j];
                    if (phase.type === PhaseTypes.SUBPHASE || phase.type === PhaseTypes.TIMEFRAME) {
                        continue;
                    }
                    const targets = [];
                    const noTargets = logData.targetless;
                    let targetCount = 0;
                    let presentAccounts = new Set();
                    for (let i = 0; i < phase.targets.length; i++) {
                        if (phase.targetPriorities[i] > 0) { continue; }
                        targetCount++;
                        if (!noTargets && targets.length < 10) {
                            const targetIndex = phase.targets[i];
                            const targetData = logData.targets[targetIndex];
                            targets.push(targetData);
                        }
                    }
                    const hideTargets = logData.wvw || (phase.type === PhaseTypes.INSTANCE && this.isMultiEncounterLog);
                    const players = getActiveNonFakePlayersForPhase(phase);
                    const squadPlayers = players.filter(x => x && !x.notInSquad);
                    const nonSquadFriendlies = players.filter(x => x && x.notInSquad);
                    const encounter = {
                        nameNoMode: phase == logData.phases[0] ? logData.logName : phase.nameNoMode,
                        name: phase == logData.phases[0] ? logData.logName : phase.name,
                        success: phase.success,
                        icon: _buildFallBackURL(phase.icon),
                        duration: phase.encounterDuration,
                        targets: targets,
                        targetCount: targetCount,
                        playerCount: squadPlayers.filter(x => {
                            if (presentAccounts.has(x.acc)) { return false; }
                            presentAccounts.add(x.acc);
                            return true;
                        }).length,
                        nonSquadFriendlyCount: nonSquadFriendlies.length,
                        mode: phase.mode,
                        start: phase.startStatus,
                        hideTargets: hideTargets,
                        hideResult: hideTargets,
                        instanceBuffs: null,
                    };
                    if (logData.instanceBuffs.length > 0) {
                        const res2 = [];
                        for (let i = 0; i < logData.instanceBuffs.length; i++) {
                            const cur = logData.instanceBuffs[i];
                            if (cur[2] <= phase.start && cur[3] >= phase.end) {
                                res2.push({buff: findSkill(true, cur[0]), stack: cur[1]});
                            }
                        }
                        if (res2.length > 0) { encounter.instanceBuffs = res2; }
                    }
                    res.push(encounter);
                }
                return res;
            },
            encounterData: function() {
                for (let i = 0; i < this.encounters.length; i++) {
                    const encounter = this.encounters[i];
                    if (encounter.active) {
                        return this.encountersData[i];
                    }
                }
                return this.encountersData[0];
            },
            fractalScale: function () { return logData.fractalScale; },
            instancePrivacy: function () { return logData.instancePrivacy; },
            resultStatus: function () {
                return this.encounterData.success
                    ? { text: 'Success', class: ["text-success"] }
                    : { text: 'Failure', class: ["text-danger"] };
            },
        }
    });
</script>

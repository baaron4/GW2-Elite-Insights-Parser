<template>
    <div class="ei-main-content">

        <!-- Section header (always visible, all sections) -->
        <div class="ei-section-header">
            <div class="ei-header-general">
                <div class="ei-boss-portrait">
                    <img v-if="activeEncounterData.icon" :src="activeEncounterData.icon" :alt="activeEncounterData.nameNoMode">
                </div>
                <div style="flex:1;min-width:0">
                    <div class="ei-boss-detail-name">
                        {{ activeEncounterData.nameNoMode }}
                        <span v-if="tab !== 0" class="ei-section-badge">{{ sectionTitle }}</span>
                    </div>
                    <div class="ei-boss-stats-row">
                        <div v-if="activeEncounterData.mode" class="ei-boss-stat"><b>{{ activeEncounterData.mode }}</b></div>
                        <div class="ei-boss-stat">Duration <b>{{ activeEncounterData.duration }}</b></div>
                        <div class="ei-boss-stat" :class="activeEncounterData.success ? 'success' : 'failure'">
                            <b>{{ activeEncounterData.success ? '&#10003; Success' : '&#10007; Failure' }}</b>
                        </div>
                    </div>
                    <div class="ei-ctx-pills" style="margin-top:8px">
                        <button class="ei-ctx-pill" v-if="hasPhasesFilter" @click="expandFilter('phase')">&#9672; {{ phaseName }}</button>
                        <button class="ei-ctx-pill" @click="expandFilter('players')">&#128101; {{ selectedPlayerName }}</button>
                        <button class="ei-ctx-pill" v-if="hasTargets" @click="expandFilter('targets')">&#127919; {{ targetSummary }}</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="ei-section-content">
        <keep-alive>
            <stat-tables-component v-if="tab === 0" :key="'stat-tables'"
                :phaseindex="activePhase" :playerindex="activePlayer"
                :activetargets="activePhaseTargets"></stat-tables-component>
            <buff-tab-component v-if="tab === 1" :key="'buff-tables'"
                :phaseindex="activePhase" :playerindex="activePlayer"></buff-tab-component>
            <dmgmodifier-stats-container-component v-if="tab === 2" :key="'modifier'"
                :phaseindex="activePhase" :playerindex="activePlayer" :activetargets="activePhaseTargets">
            </dmgmodifier-stats-container-component>
            <mechanics-stats-component v-if="tab === 3" :key="'mechanics'"
                :phaseindex="activePhase" :playerindex="activePlayer"></mechanics-stats-component>
            <graph-stats-component v-if="tab === 4" :key="'graph'"
                :activetargets="activePhaseTargets" :phaseindex="activePhase" :playerindex="activePlayer"
                :light="light"></graph-stats-component>
            <player-rotations-tab-component v-if="tab === 7" :key="'rotations'" :phaseindex="activePhase"
                :light="light" :playerindex="activePlayer">
            </player-rotations-tab-component>
            <target-stats-component v-if="tab === 5" :key="'targets'" :playerindex="activePlayer"
                :simplephase="reactiveLogdata.phases[activePhase]" :phaseindex="activePhase" :light="light">
            </target-stats-component>
            <player-stats-component v-if="tab === 6" :key="'players'"
                :activeplayer="activePlayer" :phaseindex="activePhase" :activetargets="activePhaseTargets"
                :light="light"></player-stats-component>
        </keep-alive>
        </div>
    </div>
</template>

<script>

    function getDefaultMainSubComponent() {
        if (!validateStartPath("Statistics")) {
            return 0;
        }
        const setting = EIUrlParams.get("startPage");
        const compo = setting.split('/')[1];
        switch (compo) {
            case "GeneralStats":
                return 0;
            case "Buffs":
                return 1;
            case "DamageModifiers":
                return hasDamageMods() ? 2 : 0;
            case "Mechanics":
                return hasMechanics() ? 3 : 0;
            case "Graph":
                return 4;
            case "Rotations":
                return hasRotations() ? 7 : 0;
            case "TargetsSummary":
                return hasTargets() ? 5 : 0;
            case "PlayerSummary":
                return 6;
        }
        return 0;
    }
    Vue.component("main-view-component", {
        props: ['light'],
        mixins: [encounterPhaseComponent],
        template: `${template}`,
        data: function () {
            return {
                reactiveLogdata: reactiveLogdata
            };
        },
        created: function() {
            reactiveLogdata.tab = getDefaultMainSubComponent();
        },
        computed: {
            tab: function() {
                return reactiveLogdata.tab;
            },
            activeEncounterData: function() {
                var active = this.encounters[0];
                for (var i = 0; i < this.encounters.length; i++) {
                    if (this.encounters[i].active) { active = this.encounters[i]; break; }
                }
                if (!active) return {};
                var p = logData.phases[active.index];
                return {
                    nameNoMode: p === logData.phases[0] ? logData.logName : p.nameNoMode,
                    success: p.success,
                    icon: _buildFallBackURL(p.icon),
                    duration: p.encounterDuration,
                    mode: p.mode,
                };
            },
            sectionTitle: function() {
                var titles = { 1: 'Buffs', 2: 'Damage Modifiers', 3: 'Mechanics', 4: 'Graph', 5: 'Targets Summary', 6: 'Player Summary', 7: 'Rotations' };
                return titles[this.tab] || '';
            },
            activePhase: function () {
                var phases = this.reactiveLogdata.phases;
                for (var i = 0; i < phases.length; i++) {
                    if (phases[i].active) {
                        return i;
                    }
                }
            },
            phase: function () {
                return logData.phases[this.activePhase];
            },
            activePlayer: function () {
                var players = this.reactiveLogdata.players;
                for (var i = 0; i < players.length; i++) {
                    if (players[i].active) {
                        return i;
                    }
                }
                return -1;
            },
            activePhaseTargets: function () {
                var res = [];
                var activePhase = logData.phases[this.activePhase];
                for (var i = 0; i < activePhase.targets.length; i++) {
                    var targetIndex = activePhase.targets[i];
                    var target = this.reactiveLogdata.targets[targetIndex][this.activePhase];
                    if (target.active) {
                        res.push(i);
                    }
                }
                return res;
            },
            hasDamageMods: function() {
                return hasDamageMods();
            },
            hasMechanics: function() {
                return hasMechanics();
            },
            hasTargets: function() {
                return hasTargets();
            },
            hasRotations: function() {
                return hasRotations();
            },
            hasPhasesFilter: function () {
                var phases = getPhasesForSelectedEncounter(reactiveLogdata.phases, this.encounters);
                if (!phases) return false;
                return phases.filter(function(p) { return !logData.phases[p.index].breakbarPhase; }).length > 1;
            },
            phaseName: function () {
                var phase = logData.phases[this.activePhase];
                if (!phase) return '—';
                return phase === this.encounterPhase ? phase.nameNoMode : phase.name;
            },
            selectedPlayerName: function () {
                for (var i = 0; i < logData.players.length; i++) {
                    if (logData.players[i].isFake) continue;
                    if (reactiveLogdata.players[i] && reactiveLogdata.players[i].active) {
                        return logData.players[i].name;
                    }
                }
                return 'All Players';
            },
            targetSummary: function () {
                if (!this.hasTargets) return '—';
                var phase = logData.phases[this.activePhase];
                if (!phase) return '—';
                var activeNames = [];
                for (var i = 0; i < phase.targets.length; i++) {
                    var tIdx = phase.targets[i];
                    var tReactive = reactiveLogdata.targets[tIdx];
                    if (tReactive && tReactive[this.activePhase] && tReactive[this.activePhase].active) {
                        activeNames.push(logData.targets[tIdx].name);
                    }
                }
                if (activeNames.length === 0) return 'None';
                if (activeNames.length >= phase.targets.length) return 'All Enemies';
                if (activeNames.length === 1) return activeNames[0];
                return activeNames.length + ' targets';
            },
        },
        methods: {
            expandFilter: function (type) {
                reactiveLogdata.expandSidebarFilter = type;
            },
        },
    });
</script>
